# Render Blueprint — Green Agentic (portfolio / production-ready default)
#
# Canonical location: repository root (Render auto-detects ./render.yaml).
# A copy lives at backend/render.yaml for dashboards that set Root Directory=backend.
#
# Supported topology (embedded Chroma PersistentClient):
#   Vercel (Next.js)
#     → Render Web Service (API + optional embedded worker)
#       → Neon Postgres · Cloudflare R2 · NVIDIA NIM
#       → Chroma on /data/chroma (same disk as API)
#
# WHY single web service by default:
#   Worker writes embeddings; API reads them for RAG. Separate Render disks
#   do NOT share files — a separate Background Worker with its own disk
#   breaks retrieval. Use RUN_EMBEDDED_WORKER=true so both share /data.
#
# Optional separate Background Worker is documented in
# backend/docs/RENDER_DEPLOYMENT.md (only valid after HttpClient / shared Chroma).

services:
  - type: web
    name: green-agentic-api
    runtime: docker
    plan: free
    region: oregon
    rootDir: backend
    dockerfilePath: ./Dockerfile
    dockerContext: .
    dockerBuildTarget: api
    dockerCommand: /app/scripts/docker-entrypoint-api.sh
    healthCheckPath: /api/health
    envVars:
      - key: APP_ENV
        value: production
      - key: SERVICE_ROLE
        value: api
      - key: PORT
        value: "8000"
      - key: CHROMA_PERSIST_DIRECTORY
        value: /data/chroma
      - key: CHROMA_COLLECTION_NAME
        value: documents_nemotron_v2
      - key: VECTOR_DB_PATH
        value: /data/aux
      - key: ROUTING_TELEMETRY_PATH
        value: /data/aux/routing_telemetry.jsonl
      - key: RUN_MIGRATIONS_ON_STARTUP
        value: "true"
      - key: AUTO_CREATE_SCHEMA
        value: "false"
      - key: RUN_EMBEDDED_WORKER
        value: "true"
      - key: WORKER_ID
        value: embedded-api-1
      - key: PERSIST_JOBS_TO_DB
        value: "true"
      - key: PERSIST_CONVERSATIONS_TO_DB
        value: "true"
      - key: PERSIST_ROUTING_EVENTS_TO_DB
        value: "true"
      - key: OBJECT_STORAGE_BACKEND
        value: r2
      - key: CORS_ALLOW_ALL
        value: "false"
      - key: FORCE_HTTPS
        value: "true"
      - key: TRUST_PROXY_HEADERS
        value: "true"
      - key: AUTH_COOKIE_SECURE
        value: "true"
      - key: DATABASE_REQUIRE_SSL
        value: "true"
      - key: ABUSE_PROTECTION_ENABLED
        value: "true"
      - key: API_RATE_LIMIT
        value: "120"
      - key: AI_RATE_LIMIT
        value: "20"
      - key: AI_RATE_LIMIT_GUEST
        value: "10"
      - key: SCRAPE_RATE_LIMIT
        value: "60"
      - key: DATABASE_URL
        sync: false
      - key: JWT_SECRET_KEY
        generateValue: true
      - key: NVIDIA_API_KEY
        sync: false
      - key: NVIDIA_BASE_URL
        value: https://integrate.api.nvidia.com/v1
      - key: R2_ACCOUNT_ID
        sync: false
      - key: R2_ACCESS_KEY_ID
        sync: false
      - key: R2_SECRET_ACCESS_KEY
        sync: false
      - key: R2_BUCKET
        sync: false
      - key: CORS_ORIGINS
        sync: false
