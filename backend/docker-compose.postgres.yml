services:
  postgres:
    image: postgres:16-alpine
    container_name: green-agentic-postgres
    environment:
      POSTGRES_USER: green
      POSTGRES_PASSWORD: green
      POSTGRES_DB: green_agentic
    # Loopback only — do not publish Postgres on the public interface.
    ports:
      - "127.0.0.1:5432:5432"
    volumes:
      - green_pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U green -d green_agentic"]
      interval: 5s
      timeout: 5s
      retries: 10

volumes:
  green_pgdata:
