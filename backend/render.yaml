# Render Blueprint — Green Agentic backend (portfolio / single-service Chroma)
# Root Directory in Render: backend
#
# Architecture:
#   Vercel (Next.js) → Web Service (API) → Background Worker (optional)
#   Neon Postgres · Cloudflare R2 · embedded Chroma PersistentClient · NVIDIA NIM
#
# Chroma runs inside the API/Worker containers (CHROMA_PERSIST_DIRECTORY).
# No separate Chroma private service required.
#
# CRITICAL: dockerBuildTarget must be set — Dockerfile last stage is `worker`.
# Disk: mount /data so embeddings survive restarts (paid plans). Free tier =
# ephemeral filesystem — vectors are lost on restart/redeploy.

services:
  - type: web
    name: green-agentic-api
    runtime: docker
    plan: starter
    region: oregon
    rootDir: .
    dockerfilePath: ./Dockerfile
    dockerContext: .
    dockerBuildTarget: api
    dockerCommand: /app/scripts/docker-entrypoint-api.sh
    healthCheckPath: /api/health
    envVars:
      - key: APP_ENV
        value: production
      - key: SERVICE_ROLE
        value: api
      - key: PORT
        value: "8000"
      - key: CHROMA_PERSIST_DIRECTORY
        value: /data/chroma
      - key: CHROMA_COLLECTION_NAME
        value: documents_nemotron_v2
      - key: VECTOR_DB_PATH
        value: /data/aux
      - key: RUN_MIGRATIONS_ON_STARTUP
        value: "true"
      - key: AUTO_CREATE_SCHEMA
        value: "false"
      - key: PERSIST_JOBS_TO_DB
        value: "true"
      - key: PERSIST_CONVERSATIONS_TO_DB
        value: "true"
      - key: PERSIST_ROUTING_EVENTS_TO_DB
        value: "true"
      - key: OBJECT_STORAGE_BACKEND
        value: r2
      - key: CORS_ALLOW_ALL
        value: "false"
      - key: DATABASE_URL
        sync: false
      - key: JWT_SECRET_KEY
        generateValue: true
      - key: NVIDIA_API_KEY
        sync: false
      - key: NVIDIA_BASE_URL
        value: https://integrate.api.nvidia.com/v1
      - key: R2_ACCOUNT_ID
        sync: false
      - key: R2_ACCESS_KEY_ID
        sync: false
      - key: R2_SECRET_ACCESS_KEY
        sync: false
      - key: R2_BUCKET
        sync: false
      - key: CORS_ORIGINS
        sync: false
    disk:
      name: api-data
      mountPath: /data
      sizeGB: 2

  - type: worker
    name: green-agentic-worker
    runtime: docker
    plan: starter
    region: oregon
    rootDir: .
    dockerfilePath: ./Dockerfile
    dockerContext: .
    dockerBuildTarget: worker
    dockerCommand: /app/scripts/docker-entrypoint-worker.sh
    envVars:
      - key: APP_ENV
        value: production
      - key: SERVICE_ROLE
        value: worker
      - key: CHROMA_PERSIST_DIRECTORY
        value: /data/chroma
      - key: CHROMA_COLLECTION_NAME
        value: documents_nemotron_v2
      - key: VECTOR_DB_PATH
        value: /data/aux
      - key: RUN_MIGRATIONS_ON_STARTUP
        value: "false"
      - key: AUTO_CREATE_SCHEMA
        value: "false"
      - key: PERSIST_JOBS_TO_DB
        value: "true"
      - key: PERSIST_CONVERSATIONS_TO_DB
        value: "true"
      - key: PERSIST_ROUTING_EVENTS_TO_DB
        value: "true"
      - key: OBJECT_STORAGE_BACKEND
        value: r2
      - key: WORKER_ID
        value: render-worker-1
      - key: WORKER_SHUTDOWN_GRACE_SEC
        value: "120"
      - key: DATABASE_URL
        sync: false
      - key: JWT_SECRET_KEY
        sync: false
      - key: NVIDIA_API_KEY
        sync: false
      - key: NVIDIA_BASE_URL
        value: https://integrate.api.nvidia.com/v1
      - key: R2_ACCOUNT_ID
        sync: false
      - key: R2_ACCESS_KEY_ID
        sync: false
      - key: R2_SECRET_ACCESS_KEY
        sync: false
      - key: R2_BUCKET
        sync: false
      - key: CORS_ORIGINS
        sync: false
      - key: CORS_ALLOW_ALL
        value: "false"
    disk:
      name: worker-data
      mountPath: /data
      sizeGB: 2
