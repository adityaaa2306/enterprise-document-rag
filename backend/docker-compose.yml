# Local stack with production-parity Chroma Server (shared by API + Worker).
#
#   docker compose up --build
#
# Chroma runs as its own service with a persistent volume.
# API/Worker use CHROMA_MODE=http — same pattern as Render.

name: green-agentic

services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: green
      POSTGRES_PASSWORD: green
      POSTGRES_DB: green_agentic
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U green -d green_agentic"]
      interval: 5s
      timeout: 5s
      retries: 10

  # Dedicated Chroma server — single source of truth for embeddings
  chroma:
    image: chromadb/chroma:0.5.23
    ports:
      - "8001:8000"
    volumes:
      - chroma_server_data:/chroma/chroma
    environment:
      IS_PERSISTENT: "TRUE"
      ANONYMIZED_TELEMETRY: "FALSE"
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "python -c \"import urllib.request; urllib.request.urlopen('http://127.0.0.1:8000/api/v1/heartbeat')\" || python -c \"import urllib.request; urllib.request.urlopen('http://127.0.0.1:8000/api/v2/heartbeat')\"",
        ]
      interval: 10s
      timeout: 5s
      retries: 12
      start_period: 20s
    restart: unless-stopped

  api:
    build:
      context: .
      dockerfile: Dockerfile
      target: api
    ports:
      - "8000:8000"
    env_file:
      - .env.docker
    environment:
      APP_ENV: production
      PORT: "8000"
      DATABASE_URL: postgresql+psycopg://green:green@postgres:5432/green_agentic
      # Shared Chroma server (not embedded disk)
      CHROMA_MODE: http
      CHROMA_SERVER_HOST: chroma
      CHROMA_SERVER_PORT: "8000"
      CHROMA_SERVER_SSL: "false"
      # Aux local files only (BM25/embed cache) — not vector embeddings
      VECTOR_DB_PATH: /data/aux
      OBJECT_STORAGE_BACKEND: local
      OBJECT_STORAGE_LOCAL_ROOT: /data/object_store
      RUN_MIGRATIONS_ON_STARTUP: "true"
      AUTO_CREATE_SCHEMA: "false"
      CORS_ALLOW_ALL: "false"
      CORS_ORIGINS: http://localhost:3000,http://127.0.0.1:3000
      PERSIST_JOBS_TO_DB: "true"
      PERSIST_CONVERSATIONS_TO_DB: "true"
      PERSIST_ROUTING_EVENTS_TO_DB: "true"
    volumes:
      - aux_data:/data/aux
      - object_store:/data/object_store
    depends_on:
      postgres:
        condition: service_healthy
      chroma:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-fsS", "http://127.0.0.1:8000/api/health"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 90s
    stop_grace_period: 35s
    restart: unless-stopped

  worker:
    build:
      context: .
      dockerfile: Dockerfile
      target: worker
    env_file:
      - .env.docker
    environment:
      APP_ENV: production
      DATABASE_URL: postgresql+psycopg://green:green@postgres:5432/green_agentic
      CHROMA_MODE: http
      CHROMA_SERVER_HOST: chroma
      CHROMA_SERVER_PORT: "8000"
      CHROMA_SERVER_SSL: "false"
      VECTOR_DB_PATH: /data/aux
      OBJECT_STORAGE_BACKEND: local
      OBJECT_STORAGE_LOCAL_ROOT: /data/object_store
      RUN_MIGRATIONS_ON_STARTUP: "false"
      AUTO_CREATE_SCHEMA: "false"
      PERSIST_JOBS_TO_DB: "true"
      WORKER_ID: compose-worker-1
      WORKER_POLL_INTERVAL_SEC: "2"
      WORKER_CLAIM_TIMEOUT_SEC: "900"
    volumes:
      - aux_data:/data/aux
      - object_store:/data/object_store
    depends_on:
      postgres:
        condition: service_healthy
      chroma:
        condition: service_healthy
      api:
        condition: service_healthy
    stop_grace_period: 120s
    restart: unless-stopped

volumes:
  pgdata:
  chroma_server_data:
  aux_data:
  object_store:
