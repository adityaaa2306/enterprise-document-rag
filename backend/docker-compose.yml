# Local stack — embedded Chroma PersistentClient (no separate Chroma service).
#
#   docker compose up --build
#
# API and Worker share a volume at CHROMA_PERSIST_DIRECTORY so embeddings match.

name: green-agentic

services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: green
      POSTGRES_PASSWORD: green
      POSTGRES_DB: green_agentic
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U green -d green_agentic"]
      interval: 5s
      timeout: 5s
      retries: 10

  api:
    build:
      context: .
      dockerfile: Dockerfile
      target: api
    ports:
      - "8000:8000"
    env_file:
      - .env.docker
    environment:
      APP_ENV: production
      PORT: "8000"
      DATABASE_URL: postgresql+psycopg://green:green@postgres:5432/green_agentic
      CHROMA_PERSIST_DIRECTORY: /data/chroma
      VECTOR_DB_PATH: /data/aux
      OBJECT_STORAGE_BACKEND: local
      OBJECT_STORAGE_LOCAL_ROOT: /data/object_store
      RUN_MIGRATIONS_ON_STARTUP: "true"
      AUTO_CREATE_SCHEMA: "false"
      CORS_ALLOW_ALL: "false"
      CORS_ORIGINS: http://localhost:3000,http://127.0.0.1:3000
      PERSIST_JOBS_TO_DB: "true"
      PERSIST_CONVERSATIONS_TO_DB: "true"
      PERSIST_ROUTING_EVENTS_TO_DB: "true"
    volumes:
      - chroma_data:/data/chroma
      - aux_data:/data/aux
      - object_store:/data/object_store
    depends_on:
      postgres:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-fsS", "http://127.0.0.1:8000/api/health"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 90s
    stop_grace_period: 35s
    restart: unless-stopped

  worker:
    build:
      context: .
      dockerfile: Dockerfile
      target: worker
    env_file:
      - .env.docker
    environment:
      APP_ENV: production
      DATABASE_URL: postgresql+psycopg://green:green@postgres:5432/green_agentic
      CHROMA_PERSIST_DIRECTORY: /data/chroma
      VECTOR_DB_PATH: /data/aux
      OBJECT_STORAGE_BACKEND: local
      OBJECT_STORAGE_LOCAL_ROOT: /data/object_store
      RUN_MIGRATIONS_ON_STARTUP: "false"
      AUTO_CREATE_SCHEMA: "false"
      PERSIST_JOBS_TO_DB: "true"
      WORKER_ID: compose-worker-1
      WORKER_POLL_INTERVAL_SEC: "2"
      WORKER_CLAIM_TIMEOUT_SEC: "900"
    volumes:
      - chroma_data:/data/chroma
      - aux_data:/data/aux
      - object_store:/data/object_store
    depends_on:
      postgres:
        condition: service_healthy
      api:
        condition: service_healthy
    stop_grace_period: 120s
    restart: unless-stopped

volumes:
  pgdata:
  chroma_data:
  aux_data:
  object_store:
